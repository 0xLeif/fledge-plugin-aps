name: Trust

# CorvidLabs trust gate on GitHub-hosted macOS runners.
# SpecSync pin is 5.2.0 via Trust v1.0.1 + a runner-temp file:// mirror
# (non-default SpecSync versions cannot use the remote GitHub download path).
# Fledge is preseeded into RUNNER_TEMP to avoid curl transfer flakes.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  trust:
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.1.6
        with:
          fetch-depth: 0

      - name: Fetch attest notes
        run: git fetch origin "+refs/notes/attest:refs/notes/attest" 2>/dev/null || true

      # actions/checkout embeds a token in origin; Trust then treats the worktree
      # as external and refuses event-derived ranges. Pass the canonical range
      # explicitly while keeping credentials for private-repo note fetches.
      - name: Resolve Trust comparison range
        id: trust_range
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "range=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          elif [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            empty="$(git hash-object -t tree /dev/null)"
            echo "range=${empty}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "range=${{ github.event.before }}..${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      # Trust rejects remote download overrides for non-default SpecSync versions.
      # Stage the 5.2.0 release archives under RUNNER_TEMP for an authority-free
      # file:// mirror (platform archive + adjacent .sha256).
      - name: Prepare SpecSync 5.2.0 local mirror
        id: specsync_mirror
        run: |
          set -euo pipefail
          VERSION="5.2.0"
          MIRROR="${RUNNER_TEMP}/specsync-${VERSION}-mirror"
          mkdir -p "$MIRROR"
          BASE="https://github.com/CorvidLabs/spec-sync/releases/download/v${VERSION}"
          curl_retry() {
            curl --retry 5 --retry-all-errors --retry-delay 2 -fsSL "$@"
          }
          for asset in \
            specsync-macos-aarch64.tar.gz \
            specsync-macos-x86_64.tar.gz
          do
            curl_retry "${BASE}/${asset}" -o "${MIRROR}/${asset}"
            curl_retry "${BASE}/${asset}.sha256" -o "${MIRROR}/${asset}.sha256"
            (cd "$MIRROR" && shasum -a 256 -c "${asset}.sha256")
          done
          echo "path=${MIRROR}" >> "$GITHUB_OUTPUT"

      # Trust v1.0.1 downloads Fledge into ${RUNNER_TEMP}/corvid-trust-fledge and
      # skips when the binary already exists. Preseed with retries so a flaky
      # GitHub Releases transfer cannot fail the whole gate (curl exit 18).
      - name: Preseed Fledge 1.7.0 for Trust
        run: |
          set -euo pipefail
          INSTALL_ROOT="${RUNNER_TEMP}/corvid-trust-fledge"
          case "$(uname -m)" in
            arm64) asset="fledge-macos-aarch64"
                   sha="21d0916d52ef14e6d33e3967417773369e047a0311e66bbb1eecc8f69332a040" ;;
            x86_64) asset="fledge-macos-x86_64"
                    sha="9b93babd60f87dc67c1df1902b35ab71c06912a267821c05688e6cd842c71072" ;;
            *) echo "::error::unsupported arch $(uname -m)"; exit 1 ;;
          esac
          mkdir -p "$INSTALL_ROOT/bin"
          if [ -x "$INSTALL_ROOT/bin/fledge" ]; then
            actual="$(shasum -a 256 "$INSTALL_ROOT/bin/fledge" | awk '{print $1}')"
            if [ "$actual" = "$sha" ]; then
              echo "Fledge already present at $INSTALL_ROOT/bin/fledge"
              exit 0
            fi
          fi
          curl --retry 5 --retry-all-errors --retry-delay 2 -fsSL \
            "https://github.com/CorvidLabs/fledge/releases/download/v1.7.0/$asset" \
            -o "$INSTALL_ROOT/bin/fledge"
          actual="$(shasum -a 256 "$INSTALL_ROOT/bin/fledge" | awk '{print $1}')"
          if [ "$actual" != "$sha" ]; then
            echo "::error::Fledge 1.7.0 checksum mismatch (expected $sha, got $actual)"
            exit 1
          fi
          chmod +x "$INSTALL_ROOT/bin/fledge"

      - name: CorvidLabs Trust gate
        id: trust
        uses: CorvidLabs/trust@c8f969a12209575877b5eca1ec557431621381e0 # v1.0.1
        with:
          range: ${{ steps.trust_range.outputs.range }}
          specsync-version: "5.2.0"
          specsync-download-base-url: file://${{ steps.specsync_mirror.outputs.path }}

      - name: Check managed agent rules
        run: |
          grep -q "CorvidLabs trust toolchain: BEGIN" AGENTS.md
          grep -q "CorvidLabs trust toolchain: END" AGENTS.md
